<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutomationBoost - Vidéo Promo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    h1 {
      color: #E4E4E7;
      text-align: center;
      margin-bottom: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      font-weight: 900;
    }

    .subtitle {
      color: #EAB308;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    video {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: rgba(234, 179, 8, 0.3) 0px 0px 30px 0px, rgba(234, 179, 8, 0.1) 0px 0px 60px 0px;
      background: #0D0D0D;
    }

    .description {
      color: #A1A1AA;
      text-align: center;
      margin-top: 30px;
      font-size: 16px;
      line-height: 1.6;
    }

    .cta {
      text-align: center;
      margin-top: 30px;
    }

    .cta-button {
      display: inline-block;
      background: #000000;
      color: #E4E4E7;
      padding: 15px 34px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: rgba(234, 179, 8, 0.35) 0px 4px 20px 0px;
      font-size: 16px;
      transition: transform 0.2s;
    }

    .cta-button:hover {
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 24px;
      }

      .description {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AutomationBoost</h1>
    <div class="subtitle">Promo - Gagnez 10h par semaine</div>

    <video controls width="100%">
      <source src="./video.mp4" type="video/mp4">
      Votre navigateur ne supporte pas la vidéo HTML5.
    </video>

    <div class="description">
      <p>Automatisez votre présence social media avec l'IA.</p>
      <p style="margin-top: 15px; font-size: 14px; color: #EAB308;">
        Gagnez 10 heures par semaine • 3x plus d'engagement • Publiez partout en 1 clic
      </p>
    </div>

    <div class="cta">
      <button class="cta-button">🚀 Essayer Gratuitement 14 Jours</button>
    </div>
  </div>
</body>
</html>
