<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutomationBoost - Vidéo Promo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
      color: #E4E4E7;
    }
    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #EAB308;
    }
    .header p {
      font-size: 14px;
      color: #A1A1AA;
    }
    video {
      width: 100%;
      height: auto;
      background: #000;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(234, 179, 8, 0.2);
    }
    .info {
      margin-top: 30px;
      text-align: center;
      color: #A1A1AA;
      font-size: 12px;
    }
    .info a {
      color: #EAB308;
      text-decoration: none;
    }
    .info a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AutomationBoost</h1>
      <p>Automatisez vos posts réseaux sociaux avec l'IA</p>
    </div>
    <video width="100%" height="auto" controls autoplay muted>
      <source src="https://raw.githubusercontent.com/tonyPayetDev/automatisationboost-promo/main/renders/video.mp4" type="video/mp4">
      Votre navigateur ne supporte pas la vidéo HTML5
    </video>
    <div class="info">
      <p>Vidéo de présentation produit • Format: 9:16 (mobile) • Durée: ~50 secondes</p>
      <p><a href="https://automatisationboost.com">← Retour au site</a></p>
    </div>
  </div>
</body>
</html>
