<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000000; font-family: Inter, sans-serif; }
      #root { width: 100%; height: 100%; position: relative; }
      .beat { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; opacity: 0; }
      .beat.active { opacity: 1; }
      .beat-1 { background: #000000; }
      .beat-2 { background: #000000; }
      .beat-3 { background: #000000; }
      .beat-4 { background: #000000; }
      .beat-5 { background: #000000; }
      .text { color: #E4E4E7; font-family: Orbitron, sans-serif; font-weight: 900; line-height: 1.2; max-width: 900px; padding: 40px; }
      .headline { font-size: 48px; }
      .subtext { font-size: 24px; color: #A1A1AA; margin-top: 20px; }
      .golden { color: #EAB308; }
      .stat { background: #0D0D0D; border: 1px solid rgba(234, 179, 8, 0.5); border-radius: 16px; padding: 40px; box-shadow: rgba(234, 179, 8, 0.3) 0px 0px 30px 0px; width: 240px; }
      .stat-number { font-size: 56px; font-weight: 900; color: #EAB308; margin-bottom: 12px; }
      .stat-label { font-size: 18px; color: #E4E4E7; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    </style>
  </head>
  <body>
    <audio id="audio" src="./narration.wav" data-start="0" data-duration="50" muted></audio>
    <div id="root" data-composition-id="main" data-start="0" data-duration="50" data-width="1080" data-height="1920">
      <!-- Beat 1: 0-8s -->
      <div class="beat beat-1 clip active" data-start="0" data-duration="8" data-track-index="1">
        <div class="text headline">Vous perdez<br>10h/semaine<br><span class="subtext">à gérer vos réseaux sociaux</span></div>
      </div>
      <!-- Beat 2: 8-17s -->
      <div class="beat beat-2 clip" data-start="8" data-duration="9" data-track-index="1">
        <div class="text">
          <div style="font-size: 44px; margin-bottom: 30px;">Trop manuel<br>Trop de temps<br>Trop de stress</div>
          <div class="grid" style="margin-top: 30px; justify-items: center;">
            <div style="color: #EAB308; font-size: 20px;">📱 Instagram</div>
            <div style="color: #EAB308; font-size: 20px;">🎵 TikTok</div>
            <div style="color: #EAB308; font-size: 20px;">💼 LinkedIn</div>
          </div>
        </div>
      </div>
      <!-- Beat 3: 17-27s -->
      <div class="beat beat-3 clip" data-start="17" data-duration="10" data-track-index="1">
        <div class="text headline">
          Rencontrez<br><span class="golden">AutomationBoost</span><br><div style="font-size: 32px; margin-top: 20px; color: #EAB308;">L'IA qui publie pour vous</div>
        </div>
      </div>
      <!-- Beat 4: 27-39s -->
      <div class="beat beat-4 clip" data-start="27" data-duration="12" data-track-index="1">
        <div class="grid">
          <div class="stat"><div class="stat-number">10h</div><div class="stat-label">gagnées</div></div>
          <div class="stat"><div class="stat-number">3x</div><div class="stat-label">engagement</div></div>
          <div class="stat"><div class="stat-number">1</div><div class="stat-label">clic</div></div>
        </div>
      </div>
      <!-- Beat 5: 39-50s -->
      <div class="beat beat-5 clip" data-start="39" data-duration="11" data-track-index="1">
        <div class="text headline">
          Essayez gratuitement<br><div style="font-size: 28px; color: #A1A1AA; margin-top: 20px;">14 jours • Aucune carte</div><div style="font-size: 20px; color: #EAB308; margin-top: 30px; cursor: pointer;">🚀 Essayer</div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const beats = document.querySelectorAll('.beat');
      beats.forEach((beat, i) => {
        const start = parseFloat(beat.dataset.start);
        const duration = parseFloat(beat.dataset.duration);
        tl.to(beat, { opacity: 1, duration: 0.3 }, start);
        tl.to(beat, { opacity: 0, duration: 0.3 }, start + duration - 0.3);
      });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
