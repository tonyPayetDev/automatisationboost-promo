<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000000;
        font-family: "Inter", sans-serif;
      }

      #root {
        width: 100%;
        height: 100%;
        position: relative;
      }

      .beat {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      /* Beat 1: Problem */
      .beat-1 {
        background: #000000;
        font-size: 64px;
        font-weight: 900;
        color: #E4E4E7;
        font-family: Orbitron, sans-serif;
        line-height: 1.2;
      }

      .beat-1 .text {
        max-width: 900px;
        padding: 40px;
        letter-spacing: -1.92px;
      }

      /* Beat 2: Chaos */
      .beat-2 {
        background: #000000;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        align-items: center;
        justify-items: center;
        padding: 100px 40px;
      }

      .card {
        background: #0D0D0D;
        border: 1px solid rgba(234, 179, 8, 0.5);
        border-radius: 16px;
        padding: 32px;
        width: 240px;
        text-align: center;
        color: #E4E4E7;
      }

      .card-title {
        color: #EAB308;
        font-weight: 600;
        margin-bottom: 12px;
        font-size: 18px;
      }

      .card-text {
        font-size: 14px;
        color: #A1A1AA;
      }

      /* Beat 3: Reveal */
      .beat-3 {
        background: url(./capture/assets/tony-payet.jpg) center / cover;
        background-color: #000000;
        position: relative;
      }

      .beat-3::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.4) 100%);
      }

      .beat-3 .content {
        position: relative;
        z-index: 2;
        font-size: 48px;
        font-weight: 900;
        color: #E4E4E7;
        font-family: Orbitron, sans-serif;
        text-align: center;
        max-width: 900px;
        padding: 40px;
      }

      .beat-3 .golden {
        color: #EAB308;
      }

      /* Beat 4: Benefits */
      .beat-4 {
        background: #000000;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        align-items: center;
        justify-items: center;
        padding: 40px;
      }

      .stat {
        background: #0D0D0D;
        border: 1px solid rgba(234, 179, 8, 0.5);
        border-radius: 16px;
        padding: 40px;
        box-shadow: rgba(234, 179, 8, 0.3) 0px 0px 30px 0px;
        text-align: center;
        width: 240px;
      }

      .stat-number {
        font-size: 56px;
        font-weight: 900;
        color: #EAB308;
        font-family: Orbitron, sans-serif;
        margin-bottom: 12px;
      }

      .stat-label {
        font-size: 18px;
        color: #E4E4E7;
        font-weight: 400;
      }

      /* Beat 5: CTA */
      .beat-5 {
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
      }

      .cta-headline {
        font-size: 48px;
        font-weight: 700;
        color: #E4E4E7;
        font-family: Orbitron, sans-serif;
      }

      .cta-button {
        background: #000000;
        color: #E4E4E7;
        border: none;
        border-radius: 8px;
        padding: 18px 40px;
        font-size: 18px;
        font-weight: 700;
        box-shadow: rgba(234, 179, 8, 0.35) 0px 4px 20px 0px;
        cursor: pointer;
      }

      audio {
        display: none;
      }
    </style>
  </head>
  <body>
    <audio id="audio" src="./narration.wav" data-start="0" data-duration="50" muted></audio>

    <div id="root" data-composition-id="main" data-start="0" data-duration="50" data-width="1080" data-height="1920">

      <!-- BEAT 1: Problem (0-8s) -->
      <div class="beat beat-1 clip" data-start="0" data-duration="8" data-track-index="1">
        <div class="text">
          Vous perdez<br>10h/semaine<br><span style="color: #A1A1AA; font-size: 32px; margin-top: 20px;">à gérer vos réseaux sociaux</span>
        </div>
      </div>

      <!-- BEAT 2: Chaos (8-17s) -->
      <div class="beat beat-2 clip" data-start="8" data-duration="9" data-track-index="1" style="display: none;">
        <div class="card">
          <div class="card-title">Instagram</div>
          <div class="card-text">Unpublished</div>
        </div>
        <div class="card">
          <div class="card-title">TikTok</div>
          <div class="card-text">Needs scheduling</div>
        </div>
        <div class="card">
          <div class="card-title">LinkedIn</div>
          <div class="card-text">Low engagement</div>
        </div>
      </div>

      <!-- BEAT 3: Reveal (17-27s) -->
      <div class="beat beat-3 clip" data-start="17" data-duration="10" data-track-index="1" style="display: none;">
        <div class="content">
          Rencontrez<br><span class="golden">AutomationBoost</span>
        </div>
      </div>

      <!-- BEAT 4: Benefits (27-39s) -->
      <div class="beat beat-4 clip" data-start="27" data-duration="12" data-track-index="1" style="display: none;">
        <div class="stat">
          <div class="stat-number">10h</div>
          <div class="stat-label">gagnées par semaine</div>
        </div>
        <div class="stat">
          <div class="stat-number">3x</div>
          <div class="stat-label">plus d'engagement</div>
        </div>
        <div class="stat">
          <div class="stat-number">1</div>
          <div class="stat-label">clic pour publier</div>
        </div>
      </div>

      <!-- BEAT 5: CTA (39-50s) -->
      <div class="beat beat-5 clip" data-start="39" data-duration="11" data-track-index="1" style="display: none;">
        <div class="cta-headline">Essayez gratuitement</div>
        <div style="color: #A1A1AA; font-size: 20px;">14 jours. Aucune carte requise.</div>
        <button class="cta-button">🚀 Essayer Gratuitement</button>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
